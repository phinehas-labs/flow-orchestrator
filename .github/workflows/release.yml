name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile Code (Build)
        run: pnpm build

      - name: Run Tests
        run: pnpm test

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check and Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Fetch all remote tags to compare
          git fetch --tags
          
          # Read current version from package.json
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          
          echo "Current package version: $VERSION"
          
          # Check if tag already exists in the repository
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Version $VERSION (tag $TAG) has already been released. Skipping release."
          else
            echo "New version detected: $VERSION. Starting release process..."
            
            # Configure git user
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Create and push the Git tag
            git tag "$TAG"
            git push origin "$TAG"
            
            # Compile and publish to NPM
            pnpm publish --access public --no-git-checks
            
            # Create the GitHub Release
            gh release create "$TAG" --title "$TAG" --generate-notes
            
            echo "Successfully released version $VERSION!"
          fi
